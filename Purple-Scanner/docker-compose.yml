version: '3.8'

services:
  db:
    image: postgres:13
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: vuln_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:6
    ports:
      - "6379:6379"

  zap:
    image: ghcr.io/zaproxy/zaproxy:stable
    command: >
      zap.sh -daemon -host 0.0.0.0 -port 8080
      -config api.disablekey=false
      -config api.key=${ZAP_API_KEY}
    ports:
      - "8080:8080"
    environment:
      ZAP_API_KEY: ${ZAP_API_KEY}
    user: zap
    volumes:
      - zap_data:/home/zap/.ZAP

  web:
    build: .
    ports:
      - "5000:5000"
    depends_on:
      - db
      - redis
      - zap
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      ZAP_API_KEY: ${ZAP_API_KEY}
      ZAP_URL: ${ZAP_URL}
      SECRET_KEY: ${SECRET_KEY}
    volumes:
      - .:/app
    command: >
      sh -c "flask db upgrade &&
             gunicorn -k eventlet -w 1 app:app --bind 0.0.0.0:5000"

  worker:
    build: .
    depends_on:
      - db
      - redis
      - zap
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      ZAP_API_KEY: ${ZAP_API_KEY}
      ZAP_URL: ${ZAP_URL}
    volumes:
      - .:/app
    command: celery -A app.tasks worker --loglevel=info

volumes:
  postgres_data:
  zap_data:
